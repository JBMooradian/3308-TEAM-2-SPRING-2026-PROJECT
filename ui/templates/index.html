<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cawler ID</title>
    <style>
        body {
            font-family: monospace;
            max-width: 600px;
            margin: 80px auto;
            padding: 0 20px;
            background: #f9f9f9;
            color: #111;
        }
        h1 { font-size: 2rem; margin-bottom: 8px; }
        p  { color: #555; margin-bottom: 40px; }

        .upload-box {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            background: white;
        }
        input[type="file"] { margin-bottom: 20px; }
        button {
            background: #111;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-family: monospace;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #333; }
    </style>
</head>
<body>

    <h1>Cawler ID</h1>
    <p>Upload a bird call recording and we'll identify it.</p>

    <!-- form sends file to /analyze route in app.py -->
    <div class="upload-box">
        <form action="/analyze" method="POST" enctype="multipart/form-data">
            <input type="file" name="audio_file" accept=".mp3,.wav" required><br>
            <button type="submit">Identify Bird</button>
        </form>
    </div>

</body>
</html>
